allowCompoundWords: true
cache:
  useCache: true
caseSensitive: false
enableGlobDot: true
ignorePaths:
  - .git/
  - cspell.*
ignoreRandomStrings: true
maxFileSize: 500KB
useGitignore: true
words:
  - chktex
  - clippy
  - cppcheck
  - devskim
  - dotenv
  - dustilock
  - elif
  - golangci
  - kics
  - liblaf
  - nvuillam
  - pipx
  - rumdl
  - shfmt
  - syft
