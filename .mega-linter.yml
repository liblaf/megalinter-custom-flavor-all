# yaml-language-server: $schema=https://raw.githubusercontent.com/megalinter/megalinter/main/megalinter/descriptors/schemas/megalinter-configuration.jsonschema.json

# ----------------------------- Common Variables ----------------------------- #
APPLY_FIXES: all
DISABLE_ERRORS: true
DISABLE_LINTERS:
  # Disabled reason: Bug in eslint-plugin-jsonc: <https://github.com/ota-meshi/eslint-plugin-jsonc/issues/328>
  # ref: <https://megalinter.io/latest/descriptors/json_eslint_plugin_jsonc/>
  - JSON_ESLINT_PLUGIN_JSONC
ENABLE_LINTERS:
  - ACTION_ACTIONLINT
  - ACTION_ZIZMOR
  - BASH_SHELLCHECK
  - BASH_SHFMT
  - COPYPASTE_JSCPD
  - CPP_CLANG_FORMAT
  - CPP_CPPCHECK
  - CPP_CPPLINT
  - ENV_DOTENV_LINTER
  - GO_GOLANGCI_LINT
  - JSON_JSONLINT
  - JSON_NPM_PACKAGE_JSON_LINT
  - JSON_PRETTIER
  - JSON_V8R
  - LATEX_CHKTEX
  - MARKDOWN_RUMDL
  - PYTHON_RUFF
  - PYTHON_RUFF_FORMAT
  - REPOSITORY_GIT_DIFF
  - RUST_CLIPPY
  - SPELL_CSPELL
  - YAML_PRETTIER
  - YAML_V8R
  - YAML_YAMLLINT
FILTER_REGEX_EXCLUDE: ^.+-lock\..+|.+\.lock$
IGNORE_GENERATED_FILES: true
MARKDOWN_DEFAULT_STYLE: rumdl
PRE_COMMANDS:
  - command: mkdir --parents --verbose '.github/linters/'
PYTHON_DEFAULT_STYLE: ruff
SHOW_ELAPSED_TIME: true

# ---------------------------------- Linters --------------------------------- #

# Linters / Language Linters / Bash
BASH_SHFMT_ARGUMENTS: --simplify --indent 2 --case-indent --space-redirects

# Linters / Language Linters / Python
PYTHON_RUFF_CLI_LINT_MODE: project
PYTHON_RUFF_CONFIG_FILE: LINTER_DEFAULT
PYTHON_RUFF_FORMAT_CLI_LINT_MODE: project
PYTHON_RUFF_FORMAT_CONFIG_FILE: LINTER_DEFAULT

# Linters / Formats Linters / Markdown
MARKDOWN_RUMDL_CONFIG_FILE: LINTER_DEFAULT

# Linters / Formats Linters / YAML
YAML_PRETTIER_ARGUMENTS: --no-config

# Linters / Other Checks / Spell
SPELL_CSPELL_ANALYZE_FILE_NAMES: false
SPELL_CSPELL_CONFIG_FILE: LINTER_DEFAULT
